apiVersion: v1
kind: Secret
metadata:
  name: employee-service-secret
  namespace: employee-service
  labels:
    app: employee-service
type: Opaque
data:
  # Values must be base64 encoded
  # To encode:  echo -n 'yourvalue' | base64
  # To decode:  echo 'encodedvalue' | base64 -d

  # "postgres" base64 encoded = cG9zdGdyZXM=
  DB_USER: cG9zdGdyZXM=

  # "postgres" base64 encoded = cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=

# ⚠️  IMPORTANT: Never commit real passwords to Git!
# In production use:
#   - AWS Secrets Manager
#   - HashiCorp Vault
#   - Sealed Secrets (encrypts the secret so it's safe to commit)
# For this demo project, postgres/postgres is fine.