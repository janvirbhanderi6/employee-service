version: '3.8'

# ── Named volumes: data persists between docker-compose restarts ─
volumes:
  postgres_data:

# ── Network: both services talk to each other by service name ────
networks:
  employee-network:
    driver: bridge

services:

  # ── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine          # alpine = smaller image
    container_name: employee-postgres
    environment:
      POSTGRES_DB: employeedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"                    # expose to host for DB tools (DBeaver etc.)
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persist data on restart
    networks:
      - employee-network
    healthcheck:
      # pg_isready checks if PostgreSQL is accepting connections
      test: ["CMD-SHELL", "pg_isready -U postgres -d employeedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Application ─────────────────────────────────────
  employee-service:
    build:
      context: .                       # use the Dockerfile in this directory
      dockerfile: Dockerfile
    container_name: employee-service
    ports:
      - "8080:8080"
    environment:
      # These override application.yml defaults
      # In production, Kubernetes injects these as Secrets (Step 6)
      DB_HOST: postgres                # service name = hostname on Docker network
      DB_PORT: 5432
      DB_NAME: employeedb
      DB_USER: postgres
      DB_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: default
    depends_on:
      postgres:
        condition: service_healthy     # waits for postgres healthcheck to pass
    networks:
      - employee-network
    restart: unless-stopped

  # ── (Optional) pgAdmin: visual DB browser ──────────────────────
  # Accessible at http://localhost:5050
  # Login: admin@admin.com / admin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: employee-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - employee-network
    profiles:
      - tools                          # only starts with: docker-compose --profile tools up